<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel — GenZ Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --cream: #FFFDF2;
      --black: #000000;
      --gray: #666666;
      --light-gray: #E8E6DD;
      --accent: #FF6B6B;
      --success: #51CF66;
      --warning: #FFD93D;
    }
    
    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: 600px;
    }
    
    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 700;
      color: var(--black);
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    
    .header p {
      font-size: clamp(13px, 3vw, 15px);
      color: var(--gray);
    }
    
    /* Phone Frame */
    .phone {
      width: 100%;
      max-width: 375px;
      height: auto;
      min-height: 600px;
      max-height: 812px;
      aspect-ratio: 375 / 812;
      background: var(--cream);
      border-radius: clamp(24px, 6vw, 48px);
      border: 3px solid var(--black);
      box-shadow: 
        8px 8px 0 var(--black),
        0 20px 40px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* Mobile First */
    @media (max-width: 480px) {
      body { padding: 0; }
      .header { display: none; }
      .phone {
        max-width: 100%;
        width: 100vw;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
    }
    
    /* Status Bar */
    .status-bar {
      height: clamp(36px, 8vw, 44px);
      padding: 8px clamp(12px, 4vw, 20px) 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: clamp(10px, 2.5vw, 11px);
      font-weight: 600;
      flex-shrink: 0;
      background: var(--cream);
    }
    
    /* App Header */
    .app-header {
      padding: clamp(12px, 3vw, 16px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--black);
      flex-shrink: 0;
      background: var(--cream);
    }
    
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 700;
      color: var(--black);
      letter-spacing: -1px;
    }
    
    .status-badge {
      padding: 6px 12px;
      background: var(--black);
      color: var(--cream);
      border-radius: 20px;
      font-size: clamp(10px, 2.5vw, 12px);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--cream);
    }
    
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { 
      background: var(--black);
      border-radius: 2px;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(12px, 3vw, 16px);
      padding: clamp(12px, 3vw, 16px);
    }
    
    .stat-card {
      background: var(--cream);
      border: 3px solid var(--black);
      border-radius: 16px;
      padding: clamp(16px, 4vw, 20px);
      box-shadow: 4px 4px 0 var(--black);
      transition: transform 0.2s;
    }
    
    .stat-card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--black);
    }
    
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(32px, 8vw, 40px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: clamp(12px, 3vw, 14px);
      color: var(--gray);
      font-weight: 600;
    }
    
    .stat-card.threats .stat-value { color: var(--accent); }
    .stat-card.analyzed .stat-value { color: var(--black); }
    .stat-card.safe .stat-value { color: var(--success); }
    .stat-card.score .stat-value { color: var(--warning); }
    
    /* Quick Test */
    .quick-test {
      margin: clamp(12px, 3vw, 16px);
      padding: clamp(16px, 4vw, 20px);
      background: var(--black);
      color: var(--cream);
      border-radius: 20px;
      border: 3px solid var(--black);
    }
    
    .qt-header {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2.5vw, 12px);
      margin-bottom: clamp(14px, 3.5vw, 16px);
    }
    
    .qt-icon {
      width: clamp(36px, 8vw, 40px);
      height: clamp(36px, 8vw, 40px);
      background: var(--cream);
      color: var(--black);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(18px, 4.5vw, 20px);
      font-weight: 700;
    }
    
    .qt-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(18px, 4.5vw, 20px);
      font-weight: 700;
    }
    
    .qt-select, .qt-textarea {
      width: 100%;
      padding: clamp(12px, 3vw, 14px);
      background: var(--cream);
      border: 2px solid var(--cream);
      border-radius: 12px;
      color: var(--black);
      font-size: clamp(13px, 3.2vw, 14px);
      font-family: inherit;
      margin-bottom: clamp(10px, 2.5vw, 12px);
    }
    
    .qt-textarea {
      resize: none;
      height: clamp(80px, 20vw, 100px);
    }
    
    .qt-select:focus, .qt-textarea:focus {
      outline: none;
      border-color: var(--warning);
    }
    
    .qt-btn {
      width: 100%;
      height: clamp(44px, 11vw, 50px);
      background: var(--cream);
      color: var(--black);
      border: none;
      border-radius: 12px;
      font-size: clamp(15px, 3.8vw, 16px);
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: transform 0.2s;
    }
    
    .qt-btn:active {
      transform: scale(0.98);
    }
    
    .qt-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Section Header */
    .section-header {
      padding: clamp(16px, 4vw, 20px) clamp(12px, 3vw, 16px) clamp(10px, 2.5vw, 12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(16px, 4vw, 18px);
      font-weight: 700;
    }
    
    .section-link {
      font-size: clamp(13px, 3.2vw, 14px);
      color: var(--gray);
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }
    
    /* Alert Card */
    .alert-card {
      margin: 0 clamp(12px, 3vw, 16px) clamp(12px, 3vw, 16px);
      background: var(--cream);
      border: 3px solid var(--black);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 4px 4px 0 var(--black);
    }
    
    .alert-card.high {
      border-color: var(--accent);
      box-shadow: 4px 4px 0 var(--accent);
    }
    
    .alert-header {
      padding: clamp(14px, 3.5vw, 16px);
      display: flex;
      align-items: center;
      gap: clamp(10px, 2.5vw, 12px);
      background: var(--light-gray);
    }
    
    .alert-icon {
      width: clamp(40px, 10vw, 48px);
      height: clamp(40px, 10vw, 48px);
      background: var(--black);
      color: var(--cream);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 5vw, 24px);
      flex-shrink: 0;
    }
    
    .alert-icon.high {
      background: var(--accent);
    }
    
    .alert-info {
      flex: 1;
      min-width: 0;
    }
    
    .alert-action {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(13px, 3.2vw, 14px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .alert-time {
      font-size: clamp(11px, 2.8vw, 12px);
      color: var(--gray);
      margin-top: 2px;
    }
    
    .alert-score {
      padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 16px);
      background: var(--black);
      color: var(--cream);
      border-radius: 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 700;
      flex-shrink: 0;
    }
    
    .alert-score.high {
      background: var(--accent);
    }
    
    .alert-content {
      padding: clamp(14px, 3.5vw, 16px);
    }
    
    .alert-reason {
      font-size: clamp(13px, 3.2vw, 14px);
      line-height: 1.6;
      margin-bottom: clamp(10px, 2.5vw, 12px);
    }
    
    .alert-message {
      padding: clamp(10px, 2.5vw, 12px);
      background: var(--light-gray);
      border-radius: 10px;
      border: 2px solid var(--black);
      font-size: clamp(12px, 3vw, 13px);
      color: var(--gray);
      font-family: monospace;
      word-break: break-word;
    }
    
    .alert-actions {
      padding: clamp(12px, 3vw, 14px);
      display: flex;
      gap: clamp(8px, 2vw, 10px);
      border-top: 2px solid var(--black);
    }
    
    .alert-btn {
      flex: 1;
      padding: clamp(10px, 2.5vw, 12px);
      background: var(--cream);
      border: 2px solid var(--black);
      border-radius: 10px;
      font-size: clamp(13px, 3.2vw, 14px);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    
    .alert-btn:active {
      transform: scale(0.98);
    }
    
    .alert-btn.report {
      background: var(--accent);
      color: var(--cream);
      border-color: var(--accent);
    }
    
    /* Empty State */
    .empty {
      padding: clamp(40px, 10vw, 60px) clamp(16px, 4vw, 20px);
      text-align: center;
    }
    
    .empty-icon {
      width: clamp(100px, 25vw, 140px);
      height: clamp(100px, 25vw, 140px);
      margin: 0 auto clamp(20px, 5vw, 28px);
      background: var(--black);
      color: var(--cream);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(50px, 12vw, 70px);
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--light-gray);
    }
    
    .empty-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 700;
      margin-bottom: clamp(8px, 2vw, 12px);
    }
    
    .empty-text {
      font-size: clamp(14px, 3.5vw, 16px);
      color: var(--gray);
      line-height: 1.6;
    }
    
    /* Bottom Nav */
    .bottom-nav {
      height: clamp(50px, 12vw, 60px);
      border-top: 3px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
      background: var(--cream);
    }
    
    .nav-btn {
      font-size: clamp(24px, 6vw, 28px);
      color: var(--gray);
      cursor: pointer;
      transition: all 0.2s;
      padding: 8px;
    }
    
    .nav-btn.active {
      color: var(--black);
      transform: scale(1.1);
    }
    
    /* Touch-friendly */
    @media (max-width: 768px) {
      .qt-btn, .alert-btn, .nav-btn {
        min-height: 44px;
        min-width: 44px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Sentinel — GenZ Style ✨</h1>
  <p>Cream & Black aesthetic for the modern generation</p>
</div>

<div class="phone">
  <!-- Status Bar -->
  <div class="status-bar">
    <span id="time">9:41</span>
    <span>●●● ▲ ▮▮▮</span>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <div class="logo">sentinel</div>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span>live</span>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card threats">
        <div class="stat-value" id="threats">0</div>
        <div class="stat-label">threats blocked</div>
      </div>
      <div class="stat-card analyzed">
        <div class="stat-value" id="analyzed">0</div>
        <div class="stat-label">total analyzed</div>
      </div>
      <div class="stat-card safe">
        <div class="stat-value" id="safe">0</div>
        <div class="stat-label">marked safe</div>
      </div>
      <div class="stat-card score">
        <div class="stat-value" id="avgScore">0</div>
        <div class="stat-label">avg risk score</div>
      </div>
    </div>

    <!-- Quick Test -->
    <div class="quick-test">
      <div class="qt-header">
        <div class="qt-icon">🧪</div>
        <div class="qt-title">test it out</div>
      </div>
      <select class="qt-select" id="type">
        <option value="sms">📱 sms message</option>
        <option value="call_transcript">📞 call transcript</option>
      </select>
      <textarea class="qt-textarea" id="text" placeholder="paste suspicious message here..."></textarea>
      <button class="qt-btn" id="analyzeBtn" onclick="analyze()">analyze now</button>
    </div>

    <!-- Section Header -->
    <div class="section-header">
      <div class="section-title">recent alerts</div>
      <div class="section-link">see all</div>
    </div>

    <!-- Alerts Feed -->
    <div id="feed">
      <div class="empty">
        <div class="empty-icon">🛡️</div>
        <div class="empty-title">all clear!</div>
        <div class="empty-text">no threats detected yet.<br>you're protected 24/7.</div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-btn active">🛡️</div>
    <div class="nav-btn">📜</div>
    <div class="nav-btn">⚙️</div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  
  // Update clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('time').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // Load analytics
  async function loadAnalytics() {
    try {
      const r = await fetch(API + '/analytics');
      if (!r.ok) return;
      const d = await r.json();
      document.getElementById('threats').textContent = d.total_blocked || 0;
      document.getElementById('analyzed').textContent = d.total_analyzed || 0;
      document.getElementById('safe').textContent = d.total_ignored || 0;
      document.getElementById('avgScore').textContent = Math.round(d.avg_score) || 0;
    } catch (e) {}
  }

  // Load history
  async function loadHistory() {
    try {
      const r = await fetch(API + '/alerts/history?page_size=10');
      if (!r.ok) return;
      const d = await r.json();
      const items = d.items || [];
      
      if (items.length > 0) {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        items.forEach(item => {
          feed.appendChild(buildCard(item));
        });
      }
    } catch (e) {}
  }

  // Build card
  function buildCard(item) {
    const isHigh = item.score >= 80;
    const card = document.createElement('div');
    card.className = 'alert-card' + (isHigh ? ' high' : '');
    
    card.innerHTML = `
      <div class="alert-header">
        <div class="alert-icon ${isHigh ? 'high' : ''}">
          ${isHigh ? '⚠️' : 'ℹ️'}
        </div>
        <div class="alert-info">
          <div class="alert-action">${item.action.replace(/_/g, ' ')}</div>
          <div class="alert-time">${timeAgo(item.timestamp)}</div>
        </div>
        <div class="alert-score ${isHigh ? 'high' : ''}">${item.score}%</div>
      </div>
      <div class="alert-content">
        <div class="alert-reason">${item.reasoning}</div>
        <div class="alert-message">${item.masked_text}</div>
      </div>
      <div class="alert-actions">
        <button class="alert-btn">✅ safe</button>
        <button class="alert-btn report">🚨 report</button>
      </div>
    `;
    
    return card;
  }

  // Time ago
  function timeAgo(timestamp) {
    try {
      const dt = new Date(timestamp);
      const diff = Date.now() - dt.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h ago';
      return Math.floor(hours / 24) + 'd ago';
    } catch (e) {
      return 'recently';
    }
  }

  // Analyze
  async function analyze() {
    const text = document.getElementById('text').value.trim();
    const type = document.getElementById('type').value;
    if (!text) return;

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = 'analyzing...';

    try {
      const r = await fetch(API + '/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: type,
          raw_text: text,
          device_id: 'preview'
        })
      });

      if (r.ok) {
        const data = await r.json();
        document.getElementById('text').value = '';
        
        // Add to feed
        const feed = document.getElementById('feed');
        if (feed.querySelector('.empty')) {
          feed.innerHTML = '';
        }
        feed.insertBefore(buildCard(data), feed.firstChild);
        
        // Update stats
        loadAnalytics();
      }
    } catch (e) {
      alert('Error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'analyze now';
    }
  }

  // Init
  loadAnalytics();
  loadHistory();
  setInterval(loadAnalytics, 10000);
</script>

</body>
</html>
