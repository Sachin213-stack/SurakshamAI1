name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        working-directory: sentinel_android/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "--- local.properties content ---"
          cat local.properties
          echo "--- Environment check ---"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $FLUTTER_ROOT/packages/flutter_tools/gradle/ || echo "Flutter gradle tools not found"

      - name: Flutter pub get
        working-directory: sentinel_android
        run: flutter pub get

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Flutter analyze (ignore errors)
        working-directory: sentinel_android
        run: flutter analyze || true

      - name: Build APK
        working-directory: sentinel_android
        run: |
          flutter build apk --release --verbose \
            --dart-define=API_URL=${{ secrets.API_URL || 'https://sentinel-backend.up.railway.app' }} 2>&1 | tee build.log
          
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: sentinel_android/build.log

      - name: Rename APK
        run: |
          mkdir -p release
          cp sentinel_android/build/app/outputs/flutter-apk/app-release.apk \
             release/SentinelAgent-v${{ github.run_number }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelAgent-APK
          path: release/SentinelAgent-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Sentinel Agent v1.0.${{ github.run_number }}"
          body: |
            ## 🛡️ Sentinel Agent — Autonomous Fraud Defense

            ### Features:
            - ✅ Automatic SMS fraud detection (background)
            - ✅ Call screening — Block / Allow with 5s countdown
            - ✅ Real-time red overlay alerts
            - ✅ Privacy-first PII masking (SpaCy + Regex)
            - ✅ Survives phone reboot

            ### How to install:
            1. Download `SentinelAgent-vX.apk` below
            2. On Android: Settings → Security → **Enable "Install unknown apps"**
            3. Open downloaded APK → Install
            4. Grant SMS + Call permissions
            5. Protection starts automatically!
          files: release/SentinelAgent-v${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
